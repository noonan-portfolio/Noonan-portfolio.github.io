
---
layout: single
title: "Photo Gallery"
permalink: /gallery/
---

<style>
  :root {
    --ink: #e8eaf0; --muted:#aab2bf; --chip:#11151c; --chip-active:#263247;
    --border:#2a2f3a; --bg:#0e1116; --card:#171a21;
  }
  .gal-wrap { color: var(--ink); }

  /* Secondary navbar */
  .gal-tabs { display:flex; flex-wrap:wrap; gap:.5rem; margin: .25rem 0 1rem; }
  .gal-chip {
    padding:.5rem .8rem; border-radius:999px; border:1px solid var(--border);
    background:var(--chip); color:var(--ink); cursor:pointer; user-select:none;
  }
  .gal-chip.active { background:var(--chip-active); border-color:#3a4a61; }

  /* Masonry (CSS columns) */
  .gal-grid { column-gap: 14px; }
  @media (min-width: 480px){ .gal-grid { column-count: 2; } }
  @media (min-width: 840px){ .gal-grid { column-count: 3; } }
  @media (min-width: 1200px){ .gal-grid { column-count: 4; } }

  .gal-item { break-inside: avoid; margin: 0 0 14px; position:relative; }
  .gal-item img { width:100%; display:block; border-radius:12px; }
  .gal-cap { font-size:.85rem; color:var(--muted); margin:.35rem .25rem 0; }

  /* Lightbox (native <dialog>) */
  dialog.gal-lb { border:none; padding:0; background:rgba(0,0,0,.6); }
  dialog.gal-lb::backdrop { background:rgba(0,0,0,.6); }
  .gal-lb-inner { max-width:min(92vw,1200px); margin:6vh auto; position:relative; }
  .gal-lb img { width:100%; display:block; border-radius:14px; }
  .gal-close { position:absolute; top:8px; right:8px; background:#111; color:#fff;
               border:none; border-radius:8px; padding:.4rem .6rem; cursor:pointer; }
  .gal-lb-cap { color:#d8dbe3; padding:.5rem 0 0; font-size:.95rem; }
</style>

<div class="gal-wrap">
  <div class="gal-tabs" id="tabs"></div>
  <div class="gal-grid" id="grid" aria-live="polite"></div>

  <dialog class="gal-lb" id="lb">
    <div class="gal-lb-inner">
      <button class="gal-close" id="lbClose">Close ✕</button>
      <img id="lbImg" alt="">
      <div class="gal-lb-cap" id="lbCap"></div>
    </div>
  </dialog>
</div>



<script>
  // Categories MUST match the keys in assets/gallery/photos.json
  const CATS = ['All','Nature','Travel','Victory Garden Initiative','Drone shots','Skyline','Dogs'];
  let PHOTOS = [];

  const tabs = document.getElementById('tabs');
  const grid = document.getElementById('grid');
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lbImg');
  const lbCap = document.getElementById('lbCap');
  const lbClose = document.getElementById('lbClose');

  async function loadManifest() {
    const res = await fetch('/assets/gallery/photos.json', { cache: 'no-store' });
    const data = await res.json();

    PHOTOS = [];
    for (const cat of CATS) {
      if (cat === 'All') continue;
      const items = data[cat] || [];
      items.forEach(src => PHOTOS.push({ src, cat, caption: '' }));
    }
  }

  function buildTabs(activeCat) {
    tabs.innerHTML = '';
    CATS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'gal-chip' + (c === activeCat ? ' active' : '');
      b.textContent = c;
      b.dataset.cat = c;
      b.onclick = () => selectCat(c);
      tabs.appendChild(b);
    });
  }

  function render(cat='All') {
    grid.innerHTML = '';
    const list = (cat === 'All') ? PHOTOS : PHOTOS.filter(p => p.cat === cat);

    list.forEach(p => {
      const fig = document.createElement('figure');
      fig.className = 'gal-item';

      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = encodeURI(p.src);      // IMPORTANT for spaces like "(1)"
      img.alt = p.caption || '';
      img.addEventListener('click', () => openLB(p));

      fig.appendChild(img);

      if (p.caption) {
        const cap = document.createElement('figcaption');
        cap.className = 'gal-cap';
        cap.textContent = p.caption;
        fig.appendChild(cap);
      }

      grid.appendChild(fig);
    });
  }

  function openLB(p){
    lbImg.src = encodeURI(p.src);
    lbImg.alt = p.caption || '';
    lbCap.textContent = p.caption || '';
    lb.showModal();
  }

  lbClose.onclick = () => lb.close();
  lb.addEventListener('click', e => { if (e.target === lb) lb.close(); });

  function selectCat(cat){
    document.querySelectorAll('.gal-chip').forEach(el =>
      el.classList.toggle('active', el.dataset.cat === cat)
    );
    render(cat);

    const url = new URL(window.location);
    url.searchParams.set('cat', cat);
    window.history.replaceState({}, '', url);
  }

  function getCatFromURL() {
    const paramCat = new URLSearchParams(window.location.search).get('cat');
    return (paramCat && CATS.includes(paramCat)) ? paramCat : 'All';
  }

  // INIT
  document.addEventListener('DOMContentLoaded', async () => {
    await loadManifest();
    const startCat = getCatFromURL();
    buildTabs(startCat);
    render(startCat);
  });
</script>
