---
layout: single
title: "Photo Gallery"
permalink: /gallery/
---

<style>
  :root {
    --ink: #e8eaf0; --muted:#aab2bf; --chip:#11151c; --chip-active:#263247;
    --border:#2a2f3a; --bg:#0e1116; --card:#171a21;
  }
  .gal-wrap { color: var(--ink); }

  /* Primary navbar */
  .gal-tabs { display:flex; flex-wrap:wrap; gap:.5rem; margin: .25rem 0 1rem; }
  .gal-chip {
    padding:.5rem .8rem; border-radius:999px; border:1px solid var(--border);
    background:var(--chip); color:var(--ink); cursor:pointer; user-select:none;
  }
  .gal-chip.active { background:var(--chip-active); border-color:#3a4a61; }

  /* Secondary (Travel) navbar */
  .gal-subtabs { display:flex; flex-wrap:wrap; gap:.5rem; margin: 0 0 1rem; }

  /* Masonry (CSS columns) */
  .gal-grid { column-gap: 14px; }
  @media (min-width: 480px){ .gal-grid { column-count: 2; } }
  @media (min-width: 840px){ .gal-grid { column-count: 3; } }
  @media (min-width: 1200px){ .gal-grid { column-count: 4; } }

  .gal-item { break-inside: avoid; margin: 0 0 14px; position:relative; }
  .gal-item img { width:100%; display:block; border-radius:12px; }
  .gal-cap { font-size:.85rem; color:var(--muted); margin:.35rem .25rem 0; }

  /* Lightbox (native <dialog>) */
  dialog.gal-lb { border:none; padding:0; background:rgba(0,0,0,.6); }
  dialog.gal-lb::backdrop { background:rgba(0,0,0,.6); }
  .gal-lb-inner { max-width:min(92vw,1200px); margin:6vh auto; position:relative; }
  .gal-lb img { width:100%; display:block; border-radius:14px; }
  .gal-close { position:absolute; top:8px; right:8px; background:#111; color:#fff;
               border:none; border-radius:8px; padding:.4rem .6rem; cursor:pointer; }
  .gal-lb-cap { color:#d8dbe3; padding:.5rem 0 0; font-size:.95rem; }
</style>

<div class="gal-wrap">
  <div class="gal-tabs" id="tabs"></div>
  <div class="gal-subtabs" id="subtabs" style="display:none;"></div>
  <div class="gal-grid" id="grid" aria-live="polite"></div>

  <dialog class="gal-lb" id="lb">
    <div class="gal-lb-inner">
      <button class="gal-close" id="lbClose">Close ✕</button>
      <img id="lbImg" alt="">
      <div class="gal-lb-cap" id="lbCap"></div>
    </div>
  </dialog>
</div>

<script>
  // Top-level categories MUST match keys in assets/gallery/photos.json
  // Travel is special: photos.json is expected to have "Travel": { "Trip Name": [ ... ], ... }
  const CATS = ['All','Nature','Travel','Skyline','Victory Garden Initiative'];

  let PHOTOS = [];
  let TRIPS = [];              // Travel subcategory names (from manifest)
  let ACTIVE_CAT = 'All';
  let ACTIVE_TRIP = 'All';     // 'All' means "All Travel"

  const tabs = document.getElementById('tabs');
  const subtabs = document.getElementById('subtabs');
  const grid = document.getElementById('grid');
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lbImg');
  const lbCap = document.getElementById('lbCap');
  const lbClose = document.getElementById('lbClose');

  async function loadManifest() {
    const res = await fetch('/assets/gallery/photos.json', { cache: 'no-store' });
    const data = await res.json();

    PHOTOS = [];
    TRIPS = [];

    // Non-Travel categories (arrays)
    for (const cat of CATS) {
      if (cat === 'All' || cat === 'Travel') continue;
      const items = data[cat] || [];
      items.forEach(src => PHOTOS.push({ src, cat, trip: null, caption: '' }));
    }

    // Travel (object of trips)
    const travel = data['Travel'] || {};
    TRIPS = Object.keys(travel);

    // Keep ordering predictable (your two travel subcategories)
    const preferred = ['Iceland 2018', 'Yearly River Trips / BWCA'];
    TRIPS.sort((a, b) => {
      const ia = preferred.indexOf(a);
      const ib = preferred.indexOf(b);
      if (ia !== -1 || ib !== -1) return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
      return a.localeCompare(b);
    });

    TRIPS.forEach(tripName => {
      const items = travel[tripName] || [];
      items.forEach(src => PHOTOS.push({ src, cat: 'Travel', trip: tripName, caption: '' }));
    });
  }

  function buildTabs() {
    tabs.innerHTML = '';
    CATS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'gal-chip' + (c === ACTIVE_CAT ? ' active' : '');
      b.textContent = c;
      b.dataset.cat = c;
      b.onclick = () => selectCat(c);
      tabs.appendChild(b);
    });
  }

  function buildSubtabs() {
    if (ACTIVE_CAT !== 'Travel') {
      subtabs.style.display = 'none';
      subtabs.innerHTML = '';
      return;
    }

    subtabs.style.display = '';
    subtabs.innerHTML = '';

    const allBtn = document.createElement('button');
    allBtn.className = 'gal-chip' + (ACTIVE_TRIP === 'All' ? ' active' : '');
    allBtn.textContent = 'All Travel';
    allBtn.onclick = () => selectTrip('All');
    subtabs.appendChild(allBtn);

    TRIPS.forEach(t => {
      const b = document.createElement('button');
      b.className = 'gal-chip' + (t === ACTIVE_TRIP ? ' active' : '');
      b.textContent = t;
      b.dataset.trip = t;
      b.onclick = () => selectTrip(t);
      subtabs.appendChild(b);
    });
  }

  function render() {
    grid.innerHTML = '';

    let list = PHOTOS;

    if (ACTIVE_CAT !== 'All') {
      list = list.filter(p => p.cat === ACTIVE_CAT);
    }

    if (ACTIVE_CAT === 'Travel' && ACTIVE_TRIP !== 'All') {
      list = list.filter(p => p.trip === ACTIVE_TRIP);
    }

    list.forEach(p => {
      const fig = document.createElement('figure');
      fig.className = 'gal-item';

      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = encodeURI(p.src); // IMPORTANT for spaces like "(1)"
      img.alt = p.caption || '';
      img.addEventListener('click', () => openLB(p));

      fig.appendChild(img);

      if (p.caption) {
        const cap = document.createElement('figcaption');
        cap.className = 'gal-cap';
        cap.textContent = p.caption;
        fig.appendChild(cap);
      }

      grid.appendChild(fig);
    });

    buildTabs();
    buildSubtabs();
    syncURL();
  }

  function openLB(p){
    lbImg.src = encodeURI(p.src);
    lbImg.alt = p.caption || '';
    lbCap.textContent = p.caption || '';
    lb.showModal();
  }

  lbClose.onclick = () => lb.close();
  lb.addEventListener('click', e => { if (e.target === lb) lb.close(); });

  function selectCat(cat){
    ACTIVE_CAT = cat;
    if (cat !== 'Travel') ACTIVE_TRIP = 'All';
    render();
  }

  function selectTrip(trip){
    ACTIVE_TRIP = trip;
    render();
  }

  function syncURL() {
    const url = new URL(window.location);
    url.searchParams.delete('cat');
    url.searchParams.delete('trip');

    if (ACTIVE_CAT !== 'All') url.searchParams.set('cat', ACTIVE_CAT);
    if (ACTIVE_CAT === 'Travel' && ACTIVE_TRIP !== 'All') url.searchParams.set('trip', ACTIVE_TRIP);

    window.history.replaceState({}, '', url);
  }

  function initFromURL() {
    const sp = new URLSearchParams(window.location.search);
    const cat = sp.get('cat');
    const trip = sp.get('trip');

    if (cat && CATS.includes(cat)) ACTIVE_CAT = cat;
    if (ACTIVE_CAT === 'Travel' && trip) ACTIVE_TRIP = trip;
  }

  document.addEventListener('DOMContentLoaded', async () => {
    initFromURL();
    await loadManifest();

    // If trip param isn't valid, fall back to All Travel
    if (ACTIVE_CAT === 'Travel' && ACTIVE_TRIP !== 'All' && !TRIPS.includes(ACTIVE_TRIP)) {
      ACTIVE_TRIP = 'All';
    }

    render();
  });
</script>
